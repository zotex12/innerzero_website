name: Blog auto-publish from queue

# Weekly auto-publish of the next queued blog post.
#
# Isolation notes:
# - Triggers ONLY on cron (Tuesday 09:00 UTC) and workflow_dispatch
# - Never triggers on push to main, so regular development commits are
#   unaffected
# - Rebases onto origin/main before pushing to avoid race with concurrent
#   commits
# - Fails loudly (non-zero exit, GitHub emails the repo owner) rather than
#   silently retrying
#
# Manual dry-run:
#   gh workflow run blog-auto-publish.yml -f dry_run=true
#
# Manual real run (advances the queue by one):
#   gh workflow run blog-auto-publish.yml

on:
  schedule:
    # Tuesday 09:00 UTC
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no write, no commit, no push)"
        required: false
        default: "false"
        type: string

permissions:
  contents: write

concurrency:
  group: blog-auto-publish
  cancel-in-progress: false

jobs:
  publish-next:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run publish script
        run: python scripts/publish-next-blog-post.py

      - name: Rebase and push
        run: |
          # The script only commits on real (non-dry-run) runs where the
          # queue had a file to publish. If there's nothing new on HEAD
          # versus origin/main, there's nothing to push.
          if [ -z "$(git log origin/main..HEAD --oneline)" ]; then
            echo "No new local commits to push (dry-run, queue empty, or script no-op)."
            exit 0
          fi
          git fetch origin main
          git rebase origin/main
          git push origin main
